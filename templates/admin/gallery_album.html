{% load static %}
{% include 'admin/navbar.html' %}


<style>
body{background:#F8F5F0}
.adminSection{
max-width:700px;
margin:120px auto;
background:white;
border:1px solid #D4AF37;
border-radius:20px;
padding:30px
}

form{
display:flex;
flex-direction:column;
gap:15px
}

input,textarea{
padding:12px;
border-radius:10px;
border:1px solid #ddd
}

button{
padding:14px;
background:#14213D;
color:white;
border:0;
border-radius:10px
}

</style>



<div class="adminSection">

<h2>Event Album Management</h2>


<form method="POST" action="{% url 'save_album' %}" enctype="multipart/form-data">

{% csrf_token %}


<label>Event Heading</label>

<input type="text" name="heading" required>


<label>Event Date</label>

<input type="date" name="date" required>


<label>Description</label>

<textarea name="content" required></textarea>


<label>Album Images</label>

<input type="file" name="images" accept="image/*" multiple required>


<button>
Save Event Album
</button>


</form>


</div>
