<style>
    .card {
        transition: .3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card-header {
        border-radius: 15px 15px 0 0 !important;
    }

    .btn {
        border-radius: 25px;
    }
</style>

<div class="container mt-4 d-flex justify-content-center">
    <div class="card shadow border-0" style="max-width: 650px; width:100%; border-radius:15px;">

        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0">👤 Admin Profile</h4>
        </div>

        <div class="card-body p-4">

            <div class="row mb-2">
                <div class="col-4 fw-bold text-secondary">Heading</div>
                <div class="col-8">{{ data.heading }}</div>
            </div>

            <div class="row mb-2">
                <div class="col-4 fw-bold text-secondary">Email</div>
                <div class="col-8">{{ data.email }}</div>
            </div>

            <div class="row mb-2">
                <div class="col-4 fw-bold text-secondary">Mobile</div>
                <div class="col-8">{{ data.mobile }}</div>
            </div>

            <div class="row mb-2">
                <div class="col-4 fw-bold text-secondary">Address</div>
                <div class="col-8">{{ data.address }}</div>
            </div>

            <div class="row mb-2">
                <div class="col-4 fw-bold text-secondary">WhatsApp</div>
                <div class="col-8">
                    <span class="badge bg-success">
                        {{ data.whatsapp }}
                    </span>
                </div>
            </div>

            <hr>

            <div class="text-center">
                <a href="{{ data.facebook }}" target="_blank" class="btn btn-primary btn-sm me-2">
                    Facebook
                </a>

                <a href="{{ data.instagram }}" target="_blank" class="btn btn-danger btn-sm me-2">
                    Instagram
                </a>

                <a href="{{ data.youtube }}" target="_blank" class="btn btn-dark btn-sm">
                    YouTube
                </a>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#profileModal">
                    Edit Profile
                </button>
                
            </div>

        </div>
    </div>
</div>
<div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <form  method="post">
                {% csrf_token %}

                <div class="modal-header">
                    <h5 class="modal-title">Edit Admin Profile</h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Heading</label>
                        <input type="text"
                               name="name"
                               class="form-control"
                               value="{{ data.heading }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               value="{{ data.email }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mobile</label>
                        <input type="text"
                               name="mobile"
                               class="form-control"
                               value="{{ data.mobile }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea name="address"
                                  class="form-control">{{ data.address }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="text"
                               name="password"
                               class="form-control"
                               value="{{ data.password }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Facebook</label>
                        <input type="text"
                               name="face"
                               class="form-control"
                               value="{{ data.facebook }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Instagram</label>
                        <input type="text"
                               name="insta"
                               class="form-control"
                               value="{{ data.instagram }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">YouTube</label>
                        <input type="text"
                               name="youtube"
                               class="form-control"
                               value="{{ data.youtube }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">WhatsApp</label>
                        <input type="text"
                               name="whatsapp"
                               class="form-control"
                               value="{{ data.whatsapp }}">
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Close
                    </button>

                    <button type="submit" class="btn btn-primary">
                        Save Changes
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
