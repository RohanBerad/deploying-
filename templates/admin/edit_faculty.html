{% load static %}
{% include 'admin/navbar.html' %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Faculty</title>
    <link rel="stylesheet" href="{% static 'admin/faculty.css' %}">
</head>
<body>
<div class="form-container" style="margin-left:330px">
    <h2>Edit Faculty</h2>
    <form method="POST" enctype="multipart/form-data" action="">
        {% csrf_token %}
        <div class="row-2">
            <div class="form-group">
                <label>Faculty Name</label>
                <input type="text" name="name"value="{{ faculty.name }}" required>
            </div>
            <div class="form-group">
                <label>Designation</label>
                <input type="text" name="designation" value="{{ faculty.designation }}"required>
            </div>
        </div>
        <div class="form-group">
            <label>Short Description</label>
            <textarea name="description" rows="4">{{ faculty.description }}</textarea>
        </div>

        <div class="form-group">
            <label>About Faculty</label>
            <textarea name="about_faculty" rows="5">{{ faculty.about_faculty }}</textarea>
        </div>
        <div class="row-2">
            <div class="form-group">
                <label>Current Image</label><br>
                {% if faculty.image %}
                <img src="{{ faculty.image.url }}" width="120" style="margin-bottom:10px;border-radius:8px;">
                {% endif %}
                <input type="file" name="image"accept="image/*">
            </div>
        </div>
     <hr>
        <h3>Statistics</h3>
        <div class="stat-row">
            <label>Years Experience</label>
            <input type="text"
                   name="years_experience"
                   value="{{ faculty.years_experience }}">
        </div>
        <div class="stat-row">
            <label>Students Guided</label>
            <input type="text"
                   name="students_guided"
                   value="{{ faculty.students_guided }}">
        </div>
        <button type="submit" class="btn-save">
            Update Faculty
        </button>

    </form>

</div>

</body>
</html>
