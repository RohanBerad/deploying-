{% include 'admin/navbar.html' %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background:#f5f7fb;
    }

    .main{
        margin-left:310px;
        padding:30px;
    }

    .study-card{
        background:linear-gradient(
            135deg,
            #08244B,
            #123A6B
        );

        border:1px solid rgba(212,175,55,.15);

        border-radius:25px;

        backdrop-filter:blur(20px);

        width:72%;

        margin:92px;

        box-shadow:0 15px 40px rgba(0,0,0,.25);
    }

    .card-body{
        padding:35px;
    }

    h2,
    label{
        color:#fff;
    }

    p{
        color:#cbd5e1;
    }

    .custom-input{
        height:55px;

        border-radius:14px;

        background:rgba(255,255,255,.08)!important;

        border:1px solid rgba(255,255,255,.12)!important;

        color:#fff!important;
    }

    .custom-input::placeholder{
        color:#cbd5e1;
    }

    .custom-input:focus{
        border-color:#D4AF37!important;

        box-shadow:0 0 10px rgba(212,175,55,.35)!important;

        background:rgba(255,255,255,.10)!important;
    }

    select option{
        background:#08244B;
        color:#fff;
    }

    .upload-box{
        padding:25px;

        border-radius:18px;

        background:rgba(255,255,255,.04);

        border:1px solid rgba(212,175,55,.15);

        text-align:center;
    }

    .upload-box p{
        margin-bottom:15px;
    }

    input[type=file]{
        height:50px!important;

        padding:10px;

        border-radius:12px!important;

        background:rgba(255,255,255,.08)!important;

        color:#fff!important;
    }

    .upload-btn{
        height:55px;

        min-width:180px;

        border:none;

        border-radius:14px;

        background:#D4AF37;

        color:#08244B;

        font-weight:700;

        transition:.3s;
    }

    .upload-btn:hover{
        background:#E5C158;

        color:#08244B;

        transform:translateY(-2px);
    }

    .view-btn{
        height:55px;

        min-width:180px;

        border-radius:14px;

        border:1px solid #D4AF37;
        margin-left: 363px;
        color:#D4AF37;
        transition:.3s;
        text-align: center;
        line-height: 2.5;
    }

    .view-btn:hover{
        background:#D4AF37;

        color:#08244B;
    }

    @media(max-width:1400px){
        .study-card{
            width:70%;
        }
    }

    @media(max-width:1200px){
        .study-card{
            width:85%;
        }
    }

    @media(max-width:991px){
        .main{
            margin-left:0;
            padding:15px;
        }

        .study-card{
            width:100%;
        }

        .card-body{
            padding:20px;
        }
    }
</style>


<div class="main">

    <div class="container-fluid">

        <div class="card study-card border-0">

            <div class="card-body">

                <h2 class="fw-bold mb-2">
                    Add Books & Notes
                </h2>

                <p class="mb-4">
                    Upload notes, books and study materials.
                </p>

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="row">

                        <div class="col-md-6 mb-4">
                            <label class="form-label">Icon</label>

                            <input type="text" name="icons" class="form-control custom-input"
                                placeholder="ti ti-book-download" required>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label">Title</label>

                            <input type="text" name="title" class="form-control custom-input"
                                placeholder="Enter Material Title" required>
                        </div>

                        <div class="col-md-12 mb-4">

                            <label class="form-label">
                                Select Course
                            </label>

                            <select name="course" class="form-control custom-input" required>

                                <option value="">
                                    Select Course
                                </option>

                                {% for c in courses %}
                                <option value="{{c.id}}">
                                    {{c.header}}
                                </option>
                                {% endfor %}

                            </select>

                        </div>

                    </div>

                    <label class="form-label mb-2">
                        Upload File
                    </label>

                    <div class=" mb-4">


                        <input type="file" name="files" class="form-control custom-input" required>

                    </div>

                    <div class="d-flex gap-3">

                        <button type="submit" class="btn upload-btn">

                            <i class="ti ti-upload"></i>
                            Save Material

                        </button>

                        <a href="/admin/study_list/" class="btn btn-outline-light view-btn">

                            View List

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% include "admin/footer.html" %}
