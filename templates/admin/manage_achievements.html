{% load static %}
{% include 'admin/navbar.html' %}


<!DOCTYPE html>
<html>
<head>


<title>Achievements</title>


<style>


body{
background:#F8F5F0;
font-family:Poppins,sans-serif;
}


.container{

margin:120px auto;
max-width:1200px;
background:white;
padding:25px;
border-radius:20px;

}


input{

padding:10px;
margin-bottom:15px;

}


table{

width:100%;
border-collapse:collapse;

}


td,th{

padding:12px;
border-bottom:1px solid #ddd;

}


.avatar{

width:70px;
height:70px;
border-radius:50%;
object-fit:cover;

}


button{

background:#14213D;
color:white;
border:0;
padding:8px 15px;
border-radius:8px;

}


</style>


</head>


<body>


<div class="container">


<h2>Student Achievements</h2>


<input id="search" placeholder="Search Student..." onkeyup="searchStudent()">



<table id="table">


<tr>

<th>Image</th>
<th>Name</th>
<th>Year</th>
<th>Exam</th>
<th>Rank</th>
<th>Action</th>

</tr>


{% for a in achievements %}


<tr>


<td>

<img class="avatar" src="{{a.image.url}}">

</td>


<td class="name">
{{a.student_name}}
</td>


<td>
{{a.year}}
</td>


<td>
{{a.exam}}
</td>


<td>
{{a.rank_desc}}
</td>


<td>


<a href="{% url 'delete_achievement' a.id %}">

<button onclick="return confirm('Delete achievement?')">

Delete

</button>


</a>


</td>


</tr>


{% endfor %}


</table>


</div>



<script>


function searchStudent(){


let value=document.getElementById("search").value.toLowerCase();


document.querySelectorAll("#table tr").forEach(row=>{


if(row.innerText.toLowerCase().includes(value))

row.style.display="";


else

row.style.display="none";


});


}


</script>


</body>
</html>
