{% load static %}
{% include 'admin/navbar.html' %}


<!DOCTYPE html>
<html>
<head>


<title>Manage Albums</title>


<style>

body{
background:#F8F5F0;
font-family:Poppins,sans-serif;
}


.container{

margin:120px auto;
max-width:1200px;
background:white;
padding:25px;
border-radius:20px;

}


input{

padding:10px;
width:300px;
margin-bottom:15px;

}


table{

width:100%;
border-collapse:collapse;

}


th,td{

padding:12px;
border-bottom:1px solid #ddd;
text-align:center;

}


img{

width:50px;
height:40px;
object-fit:cover;

}


button{

background:#14213D;
color:white;
padding:7px 12px;
border:0;
border-radius:8px;

}


</style>


</head>


<body>


<div class="container">


<h2>Manage Event Albums</h2>


<input id="search" placeholder="Search album..." onkeyup="searchAlbum()">



<table id="table">


<tr>

<th>Date</th>
<th>Heading</th>
<th>Images</th>
<th>Action</th>

</tr>


{% for album in albums %}


<tr>

<td>{{album.date}}</td>

<td class="heading">
{{album.heading}}
</td>


<td>

{% for img in album.images %}

<img src="{{img}}">

{% endfor %}

</td>


<td>


<a href="{% url 'delete_album' album.id %}">

<button onclick="return confirm('Delete album?')">

Delete

</button>

</a>


</td>


</tr>


{% endfor %}


</table>


</div>



<script>


function searchAlbum(){

let value=document.getElementById("search").value.toLowerCase();

document.querySelectorAll("#table tr").forEach(row=>{

if(row.innerText.toLowerCase().includes(value))

row.style.display="";

else

row.style.display="none";

});


}


</script>


</body>
</html>
