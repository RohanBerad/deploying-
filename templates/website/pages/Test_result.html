<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Result Analysis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #EA580C;
            --secondary: #1E3A8A;
            --accent: #FBBF24;
            --bg-light: #FFF7ED;
            --text-dark: #0F172A;
            --card-surface: #ffffff;
        }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
            }

            50% {
                transform: translateY(-6px);
                box-shadow: 0 18px 40px rgba(0, 0, 0, .1);
            }
        }

        .result-card {
            background: var(--card-surface);
            border: none;
            border-radius: 20px;
            box-shadow: 18px 18px 30px rgba(94, 110, 140, .18), -18px -18px 30px rgba(255, 255, 255, .9);
            transition: transform .3s ease, box-shadow .3s ease;
        }

        .animate-card {
            animation: float 6s ease-in-out infinite;
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 20px 20px 40px rgba(94, 110, 140, .2), -20px -20px 40px rgba(255, 255, 255, .95);
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            margin: auto;
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, .15), inset -6px -6px 12px rgba(255, 255, 255, .5);
            transition: transform .3s ease;
        }

        .score-circle:hover {
            transform: scale(1.03);
        }

        .stat-card {
            border: none;
            border-radius: 20px;
            text-align: center;
            box-shadow: 12px 12px 24px rgba(94, 110, 140, .14), -12px -12px 24px rgba(255, 255, 255, .9);
            transition: transform .3s ease, box-shadow .3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 14px 14px 28px rgba(94, 110, 140, .18), -14px -14px 28px rgba(255, 255, 255, .95);
        }

        .stat-correct {
            background-color: green;
            color: white;
        }

        .stat-wrong {
            background: #dc2626;
            color: white;
        }

        .stat-skipped {
            background: var(--accent);
            color: #0f172a;
        }

        .btn-primary {
            background: var(--secondary);
            border: none;
            border-radius: 999px;
            box-shadow: 8px 8px 16px rgba(94, 110, 140, .16), -8px -8px 16px rgba(255, 255, 255, .9);
            transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background: #173f6c;
            transform: translateY(-2px);
            box-shadow: 10px 10px 18px rgba(94, 110, 140, .2), -10px -10px 18px rgba(255, 255, 255, .95);
        }

        .table-theme thead {
            background: var(--secondary);
            color: white;
        }

        .progress-bar {
            background: var(--primary);
        }
    </style>

</head>

<body>

    <div class="container py-5 animate-card">

        <div class="card result-card ">

            <div class="card-body p-5">

                <h2 class="text-center mb-5">
                    🎉 Test Result Analysis
                </h2>

                <div class="score-circle mb-4" >
                    <span id="percentage">0%</span>
                </div>

                <h3 class="text-center">
                    Score :
                    <span id="score"></span>
                </h3>

                <hr class="my-4">

                <div class="row g-4">

                    <div class="col-md-4">
                        <div class="card stat-card stat-correct">
                            <div class="card-body">
                                <h2 id="correct"></h2>
                                <p>Correct</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card stat-card stat-wrong ">
                            <div class="card-body">
                                <h2 id="wrong"></h2>
                                <p>Wrong</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card stat-card stat-skipped">
                            <div class="card-body">
                                <h2 id="skipped"></h2>
                                <p>Skipped</p>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="mt-5">

                    <h5>Performance</h5>

                    <div class="progress" style="height:30px">

                        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated">
                        </div>

                    </div>

                </div>

                <div class="mt-5">

                    <h4>Subject Wise Analysis</h4>

                    <table class="table table-bordered mt-3 table-theme">

                        <thead>

                            <tr>
                                <th>Subject</th>
                                <th>Score</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr>
                                <td>Mathematics</td>
                                <td>18/20</td>
                            </tr>

                            <tr>
                                <td>Reasoning</td>
                                <td>12/15</td>
                            </tr>

                            <tr>
                                <td>English</td>
                                <td>12/15</td>
                            </tr>

                        </tbody>

                    </table>

                </div>

                <div class="text-center mt-4">



                    <button class="btn btn-primary" onclick="location.href='/Test/'">

                        Take Another Test

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="/static/website/js/Test_result.js"></script>

</body>

</html>
